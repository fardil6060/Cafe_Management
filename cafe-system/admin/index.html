<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cafe Admin — Login</title>
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body class="login-body">

  <div class="login-wrap">
    <div class="login-card">

      <div class="login-brand">
        <div class="login-logo">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8h1a4 4 0 0 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>
        </div>
        <h1>Cafe Manager</h1>
        <p>Sign in to your admin panel</p>
      </div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="field-group">
          <label for="username">Username</label>
          <input id="username" type="text" placeholder="admin" autocomplete="username" required />
        </div>
        <div class="field-group">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="pw-toggle" onclick="togglePw()">
              <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div id="login-error" class="login-error hidden"></div>
        <button type="submit" class="btn-login" id="btn-login">Sign in</button>
      </form>

      <p class="login-hint">Default: <code>admin</code> / <code>admin1234</code></p>
    </div>
  </div>

  <script>
    if (localStorage.getItem('cafe_admin_user')) {
      window.location.href = '/dashboard.html';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const errEl = document.getElementById('login-error');
      btn.textContent = 'Signing in...';
      btn.disabled = true;
      errEl.classList.add('hidden');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        localStorage.setItem('cafe_admin_user', JSON.stringify(data.user));
        window.location.href = '/dashboard.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
        btn.textContent = 'Sign in';
        btn.disabled = false;
      }
    }

    function togglePw() {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
