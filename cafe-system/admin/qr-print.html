<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Print QR Codes — Cafe Admin</title>
  <link rel="stylesheet" href="/css/admin.css" />
  <style>
    .qr-print-toolbar {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 14px 18px;
      box-shadow: var(--shadow-sm);
    }
    .host-input {
      flex: 1; min-width: 220px; padding: 8px 12px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: 13px; font-family: var(--font); outline: none;
      color: var(--text-1); background: var(--surface);
    }
    .host-input:focus { border-color: var(--brand); }

    .qr-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .qr-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 16px;
      gap: 10px;
      transition: box-shadow .15s;
    }
    .qr-card:hover { box-shadow: var(--shadow-md); }

    .qr-card-name {
      font-size: 16px; font-weight: 800; color: var(--text-1);
      text-align: center;
    }
    .qr-card-img {
      width: 160px; height: 160px; object-fit: contain;
      border-radius: 8px;
    }
    .qr-card-url {
      font-size: 10px; color: var(--text-3); font-family: var(--font-mono);
      word-break: break-all; text-align: center; line-height: 1.4;
    }
    .qr-card-status {
      display: flex; gap: 6px; align-items: center; margin-top: 4px;
    }
    .qr-card-actions {
      display: flex; gap: 6px; width: 100%; justify-content: center;
    }

    .loading-card {
      background: var(--surface-2); border: 1.5px dashed var(--border);
      border-radius: var(--radius-md); display: flex; align-items: center;
      justify-content: center; min-height: 240px; color: var(--text-3);
      font-size: 13px;
    }

    /* Print styles */
    @media print {
      .admin-layout { display: block !important; }
      .sidebar, .topbar, .qr-print-toolbar, .qr-card-actions,
      #admin-toast, .notif-bell { display: none !important; }
      .main-area { overflow: visible !important; }
      .page-content { padding: 0 !important; gap: 0 !important; }
      .qr-grid {
        display: grid !important;
        grid-template-columns: repeat(3, 1fr) !important;
        gap: 12px !important;
        break-inside: avoid;
      }
      .qr-card {
        border: 1px solid #ccc !important;
        box-shadow: none !important;
        break-inside: avoid;
        page-break-inside: avoid;
      }
      .qr-card-name { font-size: 14px !important; }
      .qr-card-img  { width: 130px !important; height: 130px !important; }
    }
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8h1a4 4 0 0 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg></div>
      <div><div class="sidebar-brand-text">Cafe Manager</div><div class="sidebar-brand-sub">Admin Panel</div></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Main</div>
      <a href="/dashboard.html" class="nav-item" data-page="dashboard.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
      <a href="/orders.html" class="nav-item" data-page="orders.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><path d="M9 12h6M9 16h4"/></svg>Orders<span class="nav-badge hidden" id="pending-orders-badge">0</span></a>
      <a href="/tables.html" class="nav-item" data-page="tables.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M6 12v6M18 12v6M4 18h5M15 18h5"/></svg>Tables</a>
      <a href="/payment.html" class="nav-item" data-page="payment.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Payment</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Manage</div>
      <a href="/menu-editor.html" class="nav-item" data-page="menu-editor.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Menu Editor</a>
      <a href="/inventory.html" class="nav-item" data-page="inventory.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>Inventory</a>
      <a href="/customers.html" class="nav-item" data-page="customers.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Customers</a>
      <a href="/sales.html" class="nav-item" data-page="sales.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>Sales History</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Tools</div>
      <a href="/qr-print.html" class="nav-item" data-page="qr-print.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="6" y="6" width="1" height="1" fill="currentColor"/><rect x="17" y="6" width="1" height="1" fill="currentColor"/><rect x="17" y="17" width="1" height="1" fill="currentColor"/><rect x="6" y="17" width="1" height="1" fill="currentColor"/></svg>Print QR Codes</a>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user"><div class="sidebar-avatar" id="sidebar-avatar">A</div><span class="sidebar-username" id="sidebar-username">admin</span></div>
      <button class="btn-signout" onclick="signOut()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign out</button>
    </div>
  </aside>

  <div class="main-area">
    <div class="topbar">
      <span class="topbar-title" id="page-title">Print QR Codes</span>
      <div class="topbar-right">
        <span class="topbar-date" id="topbar-date"></span>
        <button class="btn btn-secondary btn-sm" onclick="loadQRs()">↻ Regenerate All</button>
        <button class="btn btn-primary btn-sm" onclick="window.print()">🖨 Print All</button>
      </div>
    </div>

    <div class="page-content">

      <div class="qr-print-toolbar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-3);flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span style="font-size:13px;color:var(--text-2)">Set the URL that customers will open when they scan the QR code. Use your local network IP so phones can reach it.</span>
        <input class="host-input" id="host-input"
          placeholder="e.g. http://192.168.1.100:3000"
          value="" />
        <button class="btn btn-primary btn-sm" onclick="loadQRs()">Apply</button>
      </div>

      <div class="qr-grid" id="qr-grid">
        <div class="loading-card" style="grid-column:1/-1">Generating QR codes...</div>
      </div>

    </div>
  </div>
</div>

<div id="admin-toast"></div>
<script src="/js/core.js"></script>
<script>
  adminPageInit('Print QR Codes');

  function getHost() {
    const val = document.getElementById('host-input').value.trim();
    return val || `http://${location.hostname}:${location.port || 3000}`;
  }

  async function loadQRs() {
    const host = getHost();
    const grid = document.getElementById('qr-grid');
    grid.innerHTML = `<div class="loading-card" style="grid-column:1/-1">Generating QR codes for all tables...</div>`;

    try {
      const tables = await apiGet('/api/tables');

      // Generate all QR codes in parallel
      const qrData = await Promise.all(
        tables.map(t => apiGet(`/api/qr/table/${t.id}?host=${encodeURIComponent(host)}`))
      );

      grid.innerHTML = qrData.map(qr => `
        <div class="qr-card" id="qr-card-${qr.table_id}">
          <div class="qr-card-name">${qr.table_name}</div>
          <img class="qr-card-img" src="${qr.qr_image}" alt="QR for ${qr.table_name}" />
          <div class="qr-card-url">${qr.menu_url}</div>
          <div class="qr-card-actions">
            <button class="btn btn-secondary btn-sm" onclick="downloadOne('${qr.table_id}','${qr.table_name}')">⬇ Download</button>
            <button class="btn btn-danger btn-sm" onclick="regenOne(${qr.table_id})">↻ New QR</button>
          </div>
        </div>`).join('');

      showToast(`${qrData.length} QR codes generated`, 'success');
    } catch (err) {
      grid.innerHTML = `<div class="loading-card" style="grid-column:1/-1;color:var(--red)">Failed to load QR codes. Is the server running?</div>`;
      showToast('Failed to generate QR codes', 'error');
    }
  }

  function downloadOne(tableId, tableName) {
    const img = document.querySelector(`#qr-card-${tableId} .qr-card-img`);
    if (!img) return;
    const a  = document.createElement('a');
    a.href   = img.src;
    a.download = `QR_${tableName.replace(/\s+/g,'_')}.png`;
    a.click();
  }

  async function regenOne(tableId) {
    confirmAction('Generate a new QR code? The old one will stop working immediately.', async () => {
      try {
        await apiPost(`/api/tables/${tableId}/regenerate-qr`, {});
        showToast('New QR generated', 'success');
        await loadQRs();
      } catch (err) {
        showToast(err.message, 'error');
      }
    });
  }

  // Auto-detect local IP hint
  document.getElementById('host-input').value = `http://${location.hostname}:${location.port || 3000}`;

  loadQRs();
</script>
</body>
</html>
